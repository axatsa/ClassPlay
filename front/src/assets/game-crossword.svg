<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="cell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Grid cells — crossword pattern -->
  <!-- Row 0 -->
  <rect x="80"  y="60"  width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="120" y="60"  width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="160" y="60"  width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="200" y="60"  width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="240" y="60"  width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>

  <!-- Row 1 — some blocked -->
  <rect x="80"  y="100" width="36" height="36" rx="4" fill="#1e1b4b" opacity="0.6"/>
  <rect x="120" y="100" width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="160" y="100" width="36" height="36" rx="4" fill="#1e1b4b" opacity="0.6"/>
  <rect x="200" y="100" width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="240" y="100" width="36" height="36" rx="4" fill="#1e1b4b" opacity="0.6"/>

  <!-- Row 2 -->
  <rect x="80"  y="140" width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="120" y="140" width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="160" y="140" width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="200" y="140" width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="240" y="140" width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>

  <!-- Row 3 -->
  <rect x="80"  y="180" width="36" height="36" rx="4" fill="#1e1b4b" opacity="0.6"/>
  <rect x="120" y="180" width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="160" y="180" width="36" height="36" rx="4" fill="#1e1b4b" opacity="0.6"/>
  <rect x="200" y="180" width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="240" y="180" width="36" height="36" rx="4" fill="#1e1b4b" opacity="0.6"/>

  <!-- Row 4 -->
  <rect x="80"  y="220" width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="120" y="220" width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="160" y="220" width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="200" y="220" width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>
  <rect x="240" y="220" width="36" height="36" rx="4" fill="url(#cell)" opacity="0.9"/>

  <!-- Letters on active cells -->
  <text x="98" y="85" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="middle">A</text>
  <text x="138" y="85" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="middle">I</text>
  <text x="178" y="85" font-family="monospace" font-size="18" font-weight="bold" fill="#a5f3fc" text-anchor="middle">C</text>
  <text x="218" y="85" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="middle">E</text>
  <text x="258" y="85" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="middle">D</text>

  <text x="138" y="125" font-family="monospace" font-size="18" font-weight="bold" fill="#a5f3fc" text-anchor="middle">A</text>
  <text x="218" y="125" font-family="monospace" font-size="18" font-weight="bold" fill="#a5f3fc" text-anchor="middle">L</text>

  <text x="98" y="165" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="middle">T</text>
  <text x="138" y="165" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="middle">R</text>
  <text x="178" y="165" font-family="monospace" font-size="18" font-weight="bold" fill="#a5f3fc" text-anchor="middle">O</text>
  <text x="218" y="165" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="middle">S</text>
  <text x="258" y="165" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="middle">S</text>

  <text x="138" y="205" font-family="monospace" font-size="18" font-weight="bold" fill="#a5f3fc" text-anchor="middle">D</text>
  <text x="218" y="205" font-family="monospace" font-size="18" font-weight="bold" fill="#a5f3fc" text-anchor="middle">E</text>

  <text x="98" y="245" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="middle">S</text>
  <text x="138" y="245" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="middle">S</text>
  <text x="178" y="245" font-family="monospace" font-size="18" font-weight="bold" fill="#a5f3fc" text-anchor="middle">W</text>
  <text x="218" y="245" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="middle">O</text>
  <text x="258" y="245" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="middle">R</text>

  <!-- Number labels on first cells -->
  <text x="84" y="74" font-family="sans-serif" font-size="9" fill="#c7d2fe">1</text>
  <text x="84" y="154" font-family="sans-serif" font-size="9" fill="#c7d2fe">2</text>
  <text x="164" y="74" font-family="sans-serif" font-size="9" fill="#c7d2fe">3</text>

  <!-- Decorative glow on highlighted cells -->
  <rect x="160" y="60"  width="36" height="36" rx="4" fill="#06b6d4" opacity="0.2"/>
  <rect x="160" y="140" width="36" height="36" rx="4" fill="#06b6d4" opacity="0.2"/>
  <rect x="160" y="220" width="36" height="36" rx="4" fill="#06b6d4" opacity="0.2"/>
  <rect x="80"  y="140" width="36" height="36" rx="4" fill="#06b6d4" opacity="0.2"/>
  <rect x="120" y="140" width="36" height="36" rx="4" fill="#06b6d4" opacity="0.2"/>
  <rect x="200" y="140" width="36" height="36" rx="4" fill="#06b6d4" opacity="0.2"/>
  <rect x="240" y="140" width="36" height="36" rx="4" fill="#06b6d4" opacity="0.2"/>

  <!-- Right side clue numbers -->
  <text x="310" y="85" font-family="sans-serif" font-size="11" fill="#818cf8" opacity="0.8">1 →</text>
  <text x="310" y="165" font-family="sans-serif" font-size="11" fill="#06b6d4" opacity="0.9">2 →</text>
  <text x="310" y="245" font-family="sans-serif" font-size="11" fill="#818cf8" opacity="0.8">3 →</text>
</svg>
