services:
  db:
    image: postgres:15-alpine
    container_name: online_games_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: online_games_backend_prod
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      GEMINI_API_KEYS: ${GEMINI_API_KEYS}
      PAYMENT_SIMULATE: ${PAYMENT_SIMULATE}
      PAYME_MERCHANT_ID: ${PAYME_MERCHANT_ID}
      PAYME_SECRET_KEY: ${PAYME_SECRET_KEY}
      CLICK_SERVICE_ID: ${CLICK_SERVICE_ID}
      CLICK_MERCHANT_ID: ${CLICK_MERCHANT_ID}
      CLICK_SECRET_KEY: ${CLICK_SECRET_KEY}
      PLAN_PRO_PRICE_TIYIN: ${PLAN_PRO_PRICE_TIYIN}
      PLAN_SCHOOL_PRICE_TIYIN: ${PLAN_SCHOOL_PRICE_TIYIN}
      FRONTEND_URL: ${FRONTEND_URL}
      DEFAULT_TOKEN_LIMIT: ${DEFAULT_TOKEN_LIMIT:-30000}
      PLAN_FREE_TOKEN_LIMIT: ${PLAN_FREE_TOKEN_LIMIT:-30000}
      PLAN_PRO_TOKEN_LIMIT: ${PLAN_PRO_TOKEN_LIMIT:-300000}
      PLAN_SCHOOL_TOKEN_LIMIT: ${PLAN_SCHOOL_TOKEN_LIMIT:-1500000}
      RATE_LIMIT_PER_HOUR: ${RATE_LIMIT_PER_HOUR:-30}
      GLOBAL_RPM_LIMIT: ${GLOBAL_RPM_LIMIT:-70}
      GEMINI_KEY_COOLDOWN_SECONDS: ${GEMINI_KEY_COOLDOWN_SECONDS:-600}
    depends_on:
      - db
    networks:
      - app_network

  telegram_bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    container_name: online_games_telegram_bot
    restart: always
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_GROUP_ID: ${TELEGRAM_GROUP_ID}
      BACKEND_URL: http://backend:8000
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      - backend
    networks:
      - app_network

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: online_games_frontend_prod
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.online_games_frontend.rule=Host(`classplay.uz`) || Host(`www.classplay.uz`)"
      - "traefik.http.routers.online_games_frontend.entrypoints=websecure"
      - "traefik.http.routers.online_games_frontend.tls=true"
      - "traefik.http.routers.online_games_frontend.tls.certresolver=le"
      - "traefik.docker.network=web"
      - "traefik.http.services.online_games_frontend.loadbalancer.server.port=80"
    depends_on:
      - backend
    networks:
      - app_network
      - web

volumes:
  postgres_data_prod:

networks:
  app_network:
    driver: bridge
  web:
    external: true
